name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_AON_PROXY_URL: ${{ vars.VITE_AON_PROXY_URL }}

      - name: Inspect build output
        run: |
          echo "Checking dist output..."
          ls -la dist
          echo ""

          echo "Checking for index.html..."
          test -f dist/index.html

          echo ""
          echo "Build output size:"
          du -sh dist

          echo ""
          echo "Checking for symlinks..."
          if find dist -type l | grep -q .; then
            echo "Symlinks found in dist. GitHub Pages artifacts cannot contain symlinks."
            find dist -type l
            exit 1
          fi

          echo ""
          echo "Checking for hard-linked files..."
          if find dist -type f -links +1 | grep -q .; then
            echo "Hard links found in dist. GitHub Pages artifacts cannot contain hard links."
            find dist -type f -links +1
            exit 1
          fi

          echo ""
          echo "First few files:"
          find dist -maxdepth 3 -type f | head -50

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
